name: Build and publish python package

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+rc[0-9]+"

jobs:
  publish-on-pypi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install and test
        run: |
          uv sync --group dev
          uv run pytest

      - name: Clean working tree
        run: git reset --hard ${{ github.ref }}

      - name: Verify tag matches __version__
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          FILE_VERSION=$(uvx hatch version)
          if [ "$FILE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match pysyringe/__init__.py ($FILE_VERSION)" >&2
            exit 1
          fi

      - name: Verify CHANGELOG has entry for this version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if ! grep -E "^## \[${VERSION}\]( |$)" CHANGELOG.md > /dev/null; then
            echo "CHANGELOG.md is missing a '## [${VERSION}]' section. Move your Unreleased notes under '## [${VERSION}] — <date>' before tagging." >&2
            exit 1
          fi

      - name: Build wheel and sdist
        run: uv build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') }}

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
